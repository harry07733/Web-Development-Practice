<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="typing.css"/>
</head>

<body>
    <div id="spinner" class="d-none">
      <div class="spinner-container">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden"></span>
        </div>
      </div>
    </div>
    <div class="container-fluid bg-container p-4" id="speedTypingTest">
        <div class="row">
            <div class="col-12">
                <h1 class="main-heading mb-3">
                    Speed Typing Test
                </h1>
                <p class="fire-sentense mb-5">On your fingerslets set Go!</p>
                <div class="timer-container d-flex flex-row align-items-center">
                    <img src="https://assets.ccbp.in/frontend/dynamic-webapps/clock-img.png" class="clock-img me-2 mr-5"> 
                    <p class="timer mb-0" id="timer">0</p>
                    <span class="ms-1">seconds</span>
                </div>
                
                <div class="input-container p-3 mt-4 mb-3">
                    <p class="quote-display" id="quoteDisplay"></p>
                    <textarea class="form-control" id=quoteInput rows="5" cols="40" placeholder="Type here!!"></textarea>
                </div>
                <p class="result" id="result"></p>
                <div class="btn-container">
                    <button class="btn submit-button mr-3" id="submitBtn">Submit</button>
                    <button class="btn reset-button" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>
    </div>
    <script src="typing.js"></script>
</body>

</html>
