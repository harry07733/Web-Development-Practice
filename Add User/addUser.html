<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="addUser.css"/>
  </head>
  <body class="bg-dark d-flex justify-content-center align-items-center">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="form-card mt-5">
                    <div class="add-user-container mt-5">
                        <h1 class="heading mb-3">Add User</h1>
                        <form id="addUserForm">
                            <div class="name-section mb-4">
                                <label for="name" class="form-heading">Name</label>
                                <input type="text" id="name" class="form-control" placeholder="Enter your name"/>
                                <p class="text-danger" id="nameErrMsg"></p>
                            </div>
                            <div class="email-section mb-4">
                                <label for="email" class="form-heading">Email</label>
                                <input type="text" id="email" class="form-control" placeholder="Enter your email"/>
                                <p class="text-danger" id="emailErrMsg"></p>
                            </div>
                            <div class="status-container mb-3">
                                <h1 class="form-heading">Working Status</h1>
                                <select id="status" class="form-control">
                                    <option id="genderMale" value="Male" selected>Male</option>
                                    <option id="genderFemale" value="Female">Female</option>
                                </select>
                            </div>
                            <div class="gender-section mb-4">
                                <h1 class="form-heading">Gender</h1>
                                <input type="radio" id="genderMale" value="Male" name="gender" checked/>
                                <label for="genderMale" class="mr-3">Male</label>
                                <input type="radio" id="genderFemale" value="Male" name="gender"/>
                                <label for="genderFemale">Female</label>
                            </div>
                            <button class="btn btn-primary">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="addUser.js"></script>
  </body>
</html>
